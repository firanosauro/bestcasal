<!DOCTYPE html>
<html>
    <head>
       <style>
        body {
            background: black
        }
        img {
            width: 100%;
            align-items: center;
            margin: 3px;
        }
        h1 {
            text-align: center;
            animation: rgb 5s infinite;
            transition: 0.3s;
        }
        @keyframes rgb {
            0% {
                color: blue;
            }
            25% {
                color: yellow;
            }
            50% {
                color: red;
            }
            75% {
                color: greenyellow;
            }
            100% {
                color: blue;
            }
            
        }

       </style>
    </head>
    <body>
    <div>
        <img src="adm.jpg">
        <h1>esse ademir 🥵🥵, se alguem quiser um projeto nesse estilo pega meu zap com alguem da 905 🤭 </h1>
    </div>
    </body>
